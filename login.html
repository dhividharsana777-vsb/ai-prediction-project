<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #141e30;
            color: white;
            text-align: center;
            font-family: Arial;
            padding-top: 100px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 220px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            color: white;
            cursor: pointer;
        }

        .error {
            color: red;
        }

        a {
            color: #00c6ff;
        }
    </style>
</head>
<body>

<h2>🔐 Login Page</h2>

<form action="/login" method="post">
    <input type="text" name="username" placeholder="Username" required><br>
    <input type="password" name="password" placeholder="Password" required><br>

    <button type="submit">Login</button>
</form>

<p class="error">{{ error }}</p>

<!-- ✅ PUT IT HERE -->
<p>Don't have account? <a href="/signup_page">Signup</a></p>

</body>
</html>
