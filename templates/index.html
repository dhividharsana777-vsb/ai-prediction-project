<!DOCTYPE html>
<html>
<head>
    <title>AI Prediction System</title>

    <style>
        body {
            background: linear-gradient(to right, #1f4037, #99f2c8);
            font-family: Arial;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin: 80px auto;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 90%;
        }

        button {
            padding: 10px 20px;
            background: #1f4037;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #14532d;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }

        .logout {
            display: block;
            margin-top: 20px;
            color: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🤖 AI Prediction System</h1>
    <p>Powered by Machine Learning</p>

    <!-- ✅ FORM -->
    <form action="/predict" method="post">

        <input type="text" name="feature1" placeholder="Study Hours" required><br>
        <input type="text" name="feature2" placeholder="Sleep Hours" required><br>
        <input type="text" name="feature3" placeholder="Attendance" required><br>

        <button type="submit">Predict</button>

    </form>

    <!-- ✅ RESULT -->
    {% if prediction_text %}
    <div class="result">
        💡 Predicted Value: {{ prediction_text }}
    </div>
    {% endif %}

    <!-- ✅ LOGOUT -->
    <a href="/" class="logout">Logout</a>

</div>

</body>
</html>
