<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
</head>
<body style="text-align:center; padding-top:100px;">

<h2>Create Account</h2>

<form action="/signup" method="post">

    <button type="submit">Signup</button>
</form>

<p>Already have account? <a href="/">Login</a></p>

</body>
</html>
